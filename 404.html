<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found — SSC Sign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #030712;
      --text: #f9fafb;
      --text-secondary: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --accent: linear-gradient(135deg, #6366f1, #8b5cf6);
      --font: 'Inter', -apple-system, sans-serif;
      --font-heading: 'Plus Jakarta Sans', -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    .glow-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 400px;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to right, #6366f1, #d946ef);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
      transition: all 0.2s;
    }

    a:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="glow-orb"></div>
  <div class="container">
    <h1>404</h1>
    <p>This page doesn't exist or has been moved.</p>
    <a href="/">Go to SSC Sign</a>
  </div>
</body>
</html>
